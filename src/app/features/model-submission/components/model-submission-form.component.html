<section id="model-submission">
  <h2 id="model-submission-title">Model Submission</h2>

  <div class="contact-form-wrapper">
    <form novalidate (ngSubmit)="onSubmit(contactForm)" #contactForm="ngForm" aria-labelledby="model-submission-title">
      <div class="picture-to-upload" [class.previewing]="isPreviewing">
        <input class="file-input" type="file" name="image_attachment" accept="image/*"
          aria-label="Upload a selfie"
          aria-describedby="submission-photo-hint"
          (change)="onFileSelected($event)">

        <img [src]="imagePreviewSrc" class="img-preview" alt="Preview" />

        <div class="upload-main-text" *ngIf="!isPreviewing">
        </div>
      </div>

      <p id="submission-photo-hint" class="submission-hint text-xs text-gray-500 mt-1">
        Upload a selfie of yourself (max 10 MB).
      </p>

      <input type="text" name="name" placeholder="Name" class="text unified-text-field" required [(ngModel)]="formData.name" appTypingPlaceholder="Name" aria-label="Name" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <input type="text" name="age" placeholder="Age" class="text unified-text-field" required [(ngModel)]="formData.age" appTypingPlaceholder="Age" aria-label="Age" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <input type="email" name="email" placeholder="Email" class="text unified-text-field" required [(ngModel)]="formData.email" appTypingPlaceholder="Email" aria-label="Email address" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <input type="text" name="height" placeholder="Height (cm)" class="text unified-text-field" required [(ngModel)]="formData.height" appTypingPlaceholder="Height (cm)" aria-label="Height in centimeters" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <input type="text" name="social_network" placeholder="Social Network" class="text unified-text-field" maxlength="150" required [(ngModel)]="formData.social_network" appTypingPlaceholder="Social Network" aria-label="Social network" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <input type="text" name="location" placeholder="Mother Agency (if you have)" class="text unified-text-field" required [(ngModel)]="formData.location" appTypingPlaceholder="Mother Agency (if you have)" aria-label="Mother agency if you have one" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null">
      <textarea name="about_me" placeholder="About me" class="text unif|ied-text-field" minlength="10" maxlength="1000" required [(ngModel)]="formData.about_me" appTypingPlaceholder="About me" aria-label="About me" [attr.aria-describedby]="errorMessage ? 'submission-error' : null" [attr.aria-invalid]="errorMessage ? 'true' : null"></textarea>

      <p *ngIf="successMessage" id="submission-success" class="submission-feedback text-xs text-gray-500 mt-1" aria-live="polite">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" id="submission-error" class="submission-feedback submission-feedback-error text-xs text-gray-500 mt-1" aria-live="assertive">
        {{ errorMessage }}
      </p>

      <button type="submit" class="btn-outline-accent" [disabled]="isSubmitting || contactForm.invalid">
        <span>{{ isSubmitting ? 'Sending...' : 'SUBMIT' }}</span>
        <div class="spinner" [class.hidden]="!isSubmitting"></div>
      </button>
    </form>
  </div>
</section>
